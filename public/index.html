<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SquizzGame — Défie tes amis sous les projecteurs</title>
  <meta name="description" content="Quiz multijoueur en temps réel. Crée une partie ou rejoins tes amis avec un code, sous les projecteurs du plateau.">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body class="home">

<main class="home-stage stage-bg">

  <!-- Projecteurs -->
  <div class="spot spot--l" aria-hidden="true"></div>
  <div class="spot spot--r" aria-hidden="true"></div>

  <!-- Barre du haut : sélecteur de langue (système i18n existant) -->
  <div class="home-topbar">
    <div id="lang-switcher" class="lang-switcher"></div>
  </div>

  <!-- Centre : logo + slogan + panneau d'actions -->
  <div class="home-content">
    <h1 class="home-logo">SquizzGame</h1>
    <p class="home-slogan" data-i18n="home.slogan">Défie tes amis sous les projecteurs</p>

    <div class="panel home-panel">
      <div class="home-label-row">
        <label class="home-label" for="create-name" data-i18n="modal.create.pseudo">Ton pseudo</label>
        <span id="pseudo-verified" class="verified-badge" hidden>
          <svg class="shield-ico" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 2 4 5v6c0 5 3.4 8.6 8 11 4.6-2.4 8-6 8-11V5l-8-3Z"/>
            <path fill="#1b3f9e" d="m10.7 14.4-2.4-2.4 1.1-1.1 1.3 1.3 3.2-3.2 1.1 1.1-4.3 4.3Z"/>
          </svg>
          <span data-i18n="lobby.verifiedAccount">Compte vérifié</span>
        </span>
      </div>
      <div class="home-identity-row">
        <div id="create-avatar-picker"></div>
        <input type="text" id="create-name" class="home-input"
               data-i18n-placeholder="modal.create.pseudo.ph" placeholder="Ex : QuizzMaster42" maxlength="20">
      </div>
      <a id="pseudo-edit-link" class="pseudo-edit-link" href="/profil" data-i18n="pseudo.editInProfile" hidden>Modifier dans mon profil</a>

      <button class="btn btn--primary btn--lg btn--block home-create" onclick="createRoom()"
              data-i18n="hero.create">Créer une partie</button>

      <div class="home-or"><span data-i18n="home.or">ou</span></div>

      <label class="home-label" for="join-code" data-i18n="modal.join.code">Code d'invitation</label>
      <div class="home-join">
        <input type="text" id="join-code" class="home-input home-code"
               data-i18n-placeholder="modal.join.code.ph" placeholder="XXXXXX" maxlength="9"
               autocapitalize="characters" autocomplete="off" spellcheck="false">
        <button class="btn btn--gold btn--lg" onclick="joinRoom()" data-i18n="hero.join">Rejoindre</button>
      </div>

      <!-- Connexion Google — OPTIONNELLE. Masqué tant que /api/me n'a pas répondu
           (évite le clignotement). Ne change rien au jeu anonyme. -->
      <div class="home-auth" id="home-auth" hidden>
        <div class="home-or"><span data-i18n="auth.separator">connexion</span></div>

        <!-- État déconnecté -->
        <div id="auth-signin">
          <button type="button" class="btn btn--ghost btn--block google-btn" id="btn-google"
                  data-i18n-aria-label="auth.signInWithGoogle">
            <svg class="google-g" width="18" height="18" viewBox="0 0 18 18" aria-hidden="true" focusable="false">
              <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.71-1.57 2.68-3.89 2.68-6.62z"/>
              <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/>
              <path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33z"/>
              <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.47.9 11.43 0 9 0A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
            </svg>
            <span data-i18n="auth.signInWithGoogle">Se connecter avec Google</span>
          </button>
          <p class="home-auth-note" data-i18n="auth.optional">Optionnel — pour garder vos stats entre appareils</p>
        </div>

        <!-- État connecté -->
        <div id="auth-user" class="auth-user" hidden>
          <img id="auth-avatar" class="auth-avatar" alt="" referrerpolicy="no-referrer" hidden>
          <div class="auth-user-info">
            <span id="auth-name" class="auth-name"></span>
            <div class="auth-actions">
              <a class="auth-profile-link" href="/profil" data-i18n="nav.profile">Mon profil</a>
              <button type="button" class="auth-logout" id="btn-logout" data-i18n="auth.signOut">Se déconnecter</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Classement (Top 10 victoires) -->
    <div class="panel home-leaderboard" id="leaderboard-card">
      <div class="lb-head">
        <h2 class="lb-title" data-i18n="lb.title">🏆 Classement</h2>
        <div class="lb-controls">
          <div class="lb-tabs lb-scope">
            <button type="button" class="lb-tab active" data-scope="verified" data-i18n="lb.verified">Vérifiés</button>
            <button type="button" class="lb-tab" data-scope="all" data-i18n="lb.all">Tous</button>
          </div>
          <div class="lb-tabs lb-period">
            <button type="button" class="lb-tab active" data-period="week" data-i18n="lb.week">Semaine</button>
            <button type="button" class="lb-tab" data-period="month" data-i18n="lb.month">Mois</button>
          </div>
        </div>
      </div>
      <ol class="lb-list" id="lb-list"></ol>
      <div class="lb-empty" id="lb-empty" hidden data-i18n="lb.empty">Aucune victoire pour l'instant.</div>
    </div>
  </div>

  <!-- Sol de scène en perspective -->
  <div class="home-floor" aria-hidden="true"></div>

  <!-- Liens légaux -->
  <nav class="home-legal">
    <a href="/legal/cgu.html" data-i18n="footer.cgu">CGU</a>
    <a href="/legal/cookies.html" data-i18n="footer.cookies">Cookies</a>
    <a href="/legal/mentions-legales.html" data-i18n="footer.legal">Mentions légales</a>
    <a href="/legal/attributions.html" data-i18n="footer.attributions">Attributions</a>
  </nav>

  <!-- Rideaux : fermés au chargement, s'écartent en douceur -->
  <div class="curtain l" id="home-curtain-l" aria-hidden="true"></div>
  <div class="curtain r" id="home-curtain-r" aria-hidden="true"></div>

</main>

<div id="toast" class="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/i18n.js"></script>
<script src="js/avatar.js"></script>
<script src="js/cookies.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/pseudo.js"></script>
<script src="js/app.js"></script>
<script>
  // i18n + avatar + bandeau cookies (hooks existants conservés)
  initI18n().then(() => {
    buildAvatarPicker('create-avatar-picker');
    initCookieBanner();
    initAuth();          // connexion Google optionnelle (après i18n pour les libellés)
    initLeaderboard();   // classement (Top 10 victoires)
  });

  // ── Connexion Google (optionnelle) ──────────────────────────
  // Lit /api/me et affiche soit le bouton de connexion, soit la carte
  // utilisateur. N'impacte JAMAIS le jeu anonyme.
  async function initAuth() {
    const wrap    = document.getElementById('home-auth');
    const signin  = document.getElementById('auth-signin');
    const userBox = document.getElementById('auth-user');
    if (!wrap) return;
    try {
      const r = await fetch('/api/me', { headers: { Accept: 'application/json' } });
      const data = await r.json();
      if (data && data.authenticated && data.user) {
        document.getElementById('auth-name').textContent = data.user.displayName || '';
        const av = document.getElementById('auth-avatar');
        if (data.user.avatarUrl) {
          av.src = data.user.avatarUrl;
          av.alt = data.user.displayName || '';
          av.hidden = false;
        } else {
          av.hidden = true;
        }
        signin.hidden  = true;
        userBox.hidden = false;
        const nameInput = document.getElementById('create-name');
        const editLink  = document.getElementById('pseudo-edit-link');
        const vb        = document.getElementById('pseudo-verified');
        if (data.user.pseudo) {
          // Pseudo figé par le compte : champ verrouillé + lien vers le profil.
          if (nameInput) { nameInput.value = data.user.pseudo; nameInput.readOnly = true; nameInput.classList.add('locked'); }
          if (editLink) editLink.hidden = false;
          if (vb) vb.hidden = false;
        } else {
          // 1ère connexion : écran obligatoire « Choisis ton pseudo ».
          if (window.PseudoUI) PseudoUI.openGate(() => window.location.reload());
        }
        // Applique silencieusement la langue préférée du compte si différente.
        const pl = data.user.preferredLocale;
        if (pl && typeof getLang === 'function' && pl !== getLang() && typeof setLang === 'function') {
          setLang(pl, false);
        }
      } else {
        signin.hidden  = false;
        userBox.hidden = true;
        const nameInput = document.getElementById('create-name');
        if (nameInput) { nameInput.readOnly = false; nameInput.classList.remove('locked'); }
        const editLink = document.getElementById('pseudo-edit-link');
        if (editLink) editLink.hidden = true;
        const vb = document.getElementById('pseudo-verified');
        if (vb) vb.hidden = true;
      }
    } catch (e) {
      // Échec réseau → état déconnecté par défaut.
      signin.hidden  = false;
      userBox.hidden = true;
    } finally {
      wrap.hidden = false;
    }
  }

  document.getElementById('btn-google').addEventListener('click', () => {
    window.location.href = '/auth/google';
  });
  document.getElementById('btn-logout').addEventListener('click', async () => {
    try {
      await fetch('/auth/logout', { method: 'POST' }); // cookie same-origin auto
    } catch (e) { /* on recharge quand même */ }
    window.location.reload();
  });

  // Ouverture des rideaux au chargement (1×). pointer-events:none → ne bloque
  // jamais. prefers-reduced-motion → rideaux ouverts immédiatement.
  (function () {
    var reduce = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    var l = document.getElementById('home-curtain-l');
    var r = document.getElementById('home-curtain-r');
    function open() { if (l) l.classList.add('open'); if (r) r.classList.add('open'); }
    if (reduce) open();
    else requestAnimationFrame(function () { requestAnimationFrame(open); });
  })();
</script>
</body>
</html>
